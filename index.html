<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Cytoscape Network Visualization</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
    <script src="https://unpkg.com/cytoscape-svg@0.4.0/cytoscape-svg.js"></script>
    <script src="https://unpkg.com/graphology@0.25.4/dist/graphology.umd.js"></script>
    <script src="https://unpkg.com/graphology-library@0.8.0/dist/graphology-library.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/i18next@23.7.6/dist/umd/i18next.min.js"></script>
    <script>
        window.DATAVIZ_HEADER_CONFIG = { mode: 'public' };
    </script>
    <script src="https://auth.dataviz.jp/lib/supabase.js"></script>
    <script src="https://auth.dataviz.jp/lib/dataviz-auth-client.js"></script>
    <script src="https://auth.dataviz.jp/lib/dataviz-tool-header.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-1J6ZDNG6DQ"></script>
<script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-1J6ZDNG6DQ');
</script>

<body>
    <dataviz-tool-header></dataviz-tool-header>
    <div id="controls">
        <div class="control-row">
            <label for="layout-select" id="layoutLabel">レイアウト:</label>
            <select id="layout-select">
                <option value="grid">Grid</option>
                <option value="circle">Circle</option>
                <option value="concentric">Concentric</option>
                <option value="breadthfirst">Breadthfirst</option>
                <option value="cose">Cose (Physics)</option>
                <option value="random">Random</option>
            </select>
            <label for="easing-select" id="easingLabel">イージング:</label>
            <select id="easing-select">
                <option value="ease">Ease</option>
                <option value="linear">Linear</option>
                <option value="ease-in">Ease In</option>
                <option value="ease-out">Ease Out</option>
                <option value="ease-in-out">Ease In Out</option>
            </select>
            <label for="node-color-select" id="colorLabel">色:</label>
            <select id="node-color-select">
                <option value="">(None)</option>
            </select>
            <label for="node-size-select" id="sizeLabel">サイズ:</label>
            <select id="node-size-select">
                <option value="">(None)</option>
            </select>
            <label for="node-label-select" id="labelLabel">ラベル:</label>
            <select id="node-label-select">
                <option value="">(Default)</option>
            </select>
        </div>

        <!-- Hidden inputs triggered by tool header -->
        <input type="file" id="file-upload" accept=".gexf, .graphml" style="display: none;">

        <div class="sample-dataset-container" style="display: none;">
            <label for="sample-dataset-select" id="sampleLabel">サンプル・データセット:</label>
            <select id="sample-dataset-select">
                <optgroup label="Social Networks">
                    <option value="lesmis" selected>Les Misérables</option>
                    <option value="got">Game of Thrones</option>
                    <option value="marvel">Marvel Universe</option>
                    <option value="quakers">Quakers (17th Century)</option>
                </optgroup>
                <optgroup label="Scientific Networks">
                    <option value="eurosis">EuroSiS</option>
                    <option value="diseasome">Diseasome</option>
                    <option value="celegans">C. Elegans</option>
                    <option value="java">Java Dependencies</option>
                    <option value="powergrid">Power Grid</option>
                </optgroup>
            </select>
        </div>

        <div class="control-row bottom-row" style="display: none;">
            <button id="server-save-btn">Server Save</button>
            <button id="server-load-btn">Server Load</button>
        </div>
    </div>
    <div id="cy"></div>

    <!-- Modals -->
    <div id="save-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="saveTitle">Save Project</h2>
            <input type="text" id="save-project-name" placeholder="Project Name">
            <div class="modal-actions">
                <button id="confirm-save-btn" class="primary-btn" id="saveBtnLabel">Save</button>
                <button id="cancel-save-btn" class="secondary-btn" id="cancelSaveBtnLabel">Cancel</button>
            </div>
        </div>
    </div>

    <div id="load-modal" class="modal hidden">
        <div class="modal-content large-modal">
            <h2 id="loadTitle">Load Project</h2>
            <div id="project-list" class="project-list">
                <!-- Projects will be injected here -->
            </div>
            <div class="modal-actions">
                <button id="cancel-load-btn" class="secondary-btn" id="closeBtnLabel">Close</button>
            </div>
        </div>
    </div>

    <script src="script.js" type="module"></script>
</body>

</html>
